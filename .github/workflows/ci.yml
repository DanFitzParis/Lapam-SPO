name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Type Check + Lint + Test + Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL_CI }}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY_CI }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY_CI }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
      TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
      TWILIO_PHONE_NUMBER: ${{ secrets.TWILIO_PHONE_NUMBER }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:

      - name: Install dependencies
        working-directory: projects/ats
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: projects/ats
        run: npx prisma generate

      - name: Type check
        working-directory: projects/ats
        run: npx tsc --noEmit

      - name: Lint
        working-directory: projects/ats
        run: npx biome check .

      - name: Unit tests
        working-directory: projects/ats
        run: pnpm vitest run

      - name: Build
        working-directory: projects/ats
        run: pnpm build

  auto-merge:
    name: Auto-merge qualifying PRs
    needs: check
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.user.login != 'dependabot[bot]' &&
      contains(github.event.pull_request.body, '## Risk') &&
      !contains(github.event.pull_request.body, '**high**')
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable auto-merge
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const riskMatch = body.match(/## Risk\s*\n\s*\*{0,2}(low|medium|high)\*{0,2}/i);
            const risk = riskMatch ? riskMatch[1].toLowerCase() : 'unknown';

            if (risk === 'low' || risk === 'medium') {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                merge_method: 'squash'
              });
              console.log(`Auto-merged PR #${context.payload.pull_request.number} (${risk} risk)`);
            } else {
              console.log(`Skipping auto-merge: risk is "${risk}"`);
            }
