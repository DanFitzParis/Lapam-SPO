openapi: 3.1.0
info:
  title: Lapam-ATS API
  version: 1.0.0-draft
  description: >
    REST API for Lapam-ATS. All endpoints are Next.js Route Handlers under /app/api/.
    All tenant-scoped endpoints require a valid Clerk session with an active organisation.
    The tenantId is derived from the Clerk session — it is never passed as a request parameter.
    Generated by Specification Agent. Parent: docs/specs/PRD.md
  x-agent: specification
  x-status: draft
  x-architecture: docs/specs/ADR-001-tech-stack.md

servers:
  - url: https://{tenant}.lapam-ats.com/api
    variables:
      tenant:
        default: app
        description: Tenant subdomain or app subdomain for multi-tenant routing

components:
  securitySchemes:
    clerkSession:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        Clerk session JWT. All operator-facing endpoints require this.
        Candidate-facing endpoints use token-based auth (applyLinkToken, acceptanceToken).

  schemas:

    # ─── COMMON ───────────────────────────────────────────────────────────────

    Error:
      type: object
      required: [code, message]
      properties:
        code:    { type: string }
        message: { type: string }

    PaginatedMeta:
      type: object
      properties:
        total:   { type: integer }
        page:    { type: integer }
        perPage: { type: integer }

    # ─── LOCATION ─────────────────────────────────────────────────────────────

    Location:
      type: object
      required: [id, name, country, isActive]
      properties:
        id:       { type: string }
        name:     { type: string }
        country:  { type: string, enum: [GB, IE, FR, DE, NL, ES, IT, US, OTHER] }
        timezone: { type: string, nullable: true }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }

    LocationCreate:
      type: object
      required: [name, country]
      properties:
        name:     { type: string }
        country:  { type: string, enum: [GB, IE, FR, DE, NL, ES, IT, US, OTHER] }
        timezone: { type: string }

    # ─── JOB ──────────────────────────────────────────────────────────────────

    Job:
      type: object
      required: [id, title, locationId, status]
      properties:
        id:             { type: string }
        title:          { type: string }
        description:    { type: string }
        locationId:     { type: string }
        locationType:   { type: string, enum: [RESTAURANT, HOTEL, BAR, EVENTS, OTHER], nullable: true }
        employmentType: { type: string, enum: [FULL_TIME, PART_TIME, SEASONAL, ZERO_HOURS, FLEXIBLE] }
        status:         { type: string, enum: [DRAFT, PUBLISHED, CLOSED, ARCHIVED] }
        applyUrl:       { type: string, description: "Public apply URL — includes applyLinkToken" }
        applicationCount: { type: integer }
        createdAt:      { type: string, format: date-time }
        closedAt:       { type: string, format: date-time, nullable: true }

    JobCreate:
      type: object
      required: [title, locationId]
      properties:
        title:             { type: string }
        description:       { type: string }
        locationId:        { type: string }
        locationType:      { type: string, enum: [RESTAURANT, HOTEL, BAR, EVENTS, OTHER] }
        employmentType:    { type: string, enum: [FULL_TIME, PART_TIME, SEASONAL, ZERO_HOURS, FLEXIBLE] }
        screeningQuestions:
          type: array
          maxItems: 5
          items: { $ref: '#/components/schemas/ScreeningQuestionCreate' }

    ScreeningQuestionCreate:
      type: object
      required: [question, type, order]
      properties:
        question:   { type: string }
        type:       { type: string, enum: [FREE_TEXT, YES_NO, SINGLE_CHOICE] }
        options:    { type: array, items: { type: string } }
        isKnockout: { type: boolean, default: false }
        order:      { type: integer }

    # ─── PIPELINE DASHBOARD ───────────────────────────────────────────────────

    DashboardLocation:
      type: object
      properties:
        locationId:   { type: string }
        locationName: { type: string }
        country:      { type: string }
        openRoles:    { type: integer }
        stageCounts:
          type: object
          properties:
            APPLIED:    { type: integer }
            SCREENING:  { type: integer }
            INTERVIEW:  { type: integer }
            OFFER:      { type: integer }
            HIRED:      { type: integer }
        stalertAlert: { type: boolean, description: "True if any open role has 0 active candidates and is 5+ days old" }

    # ─── CANDIDATE ────────────────────────────────────────────────────────────

    Application:
      type: object
      required: [id, jobId, stage, createdAt]
      properties:
        id:                { type: string }
        jobId:             { type: string }
        jobTitle:          { type: string }
        locationId:        { type: string }
        locationName:      { type: string }
        stage:             { type: string, enum: [APPLIED, SCREENING, INTERVIEW, OFFER, HIRED, REJECTED, WITHDRAWN] }
        source:            { type: string, enum: [DIRECT, INDEED, GOOGLE_JOBS, REFERRAL, TALENT_POOL] }
        isKnockoutFlagged: { type: boolean }
        candidate:
          type: object
          properties:
            id:           { type: string }
            firstName:    { type: string }
            lastName:     { type: string }
            mobileNumber: { type: string, nullable: true }
            email:        { type: string, nullable: true }
        screeningResponses:
          type: array
          items:
            type: object
            properties:
              question:   { type: string }
              response:   { type: string }
              isKnockout: { type: boolean }
        createdAt:         { type: string, format: date-time }

    # ─── CANDIDATE-FACING (PUBLIC) ────────────────────────────────────────────

    PublicJobDetails:
      type: object
      required: [title, locationName, employmentType, screeningQuestions]
      properties:
        title:             { type: string }
        description:       { type: string }
        locationName:      { type: string }
        country:           { type: string }
        employmentType:    { type: string }
        screeningQuestions:
          type: array
          items:
            type: object
            properties:
              id:       { type: string }
              question: { type: string }
              type:     { type: string }
              options:  { type: array, items: { type: string } }
        gdprNotice:
          type: object
          description: "GDPR consent notice text — rendered inline on the form"
          properties:
            dataController: { type: string }
            purpose:        { type: string }
            retentionPeriod: { type: string }
            rightsUrl:      { type: string }

    CandidateApplicationSubmit:
      type: object
      required: [firstName, lastName, consentGiven]
      properties:
        firstName:         { type: string }
        lastName:          { type: string }
        mobileNumber:      { type: string }
        email:             { type: string }
        availabilityType:  { type: string, enum: [FULL_TIME, PART_TIME, FLEXIBLE] }
        cvDocumentKey:     { type: string, description: "Cloudflare R2 key from pre-signed upload; optional" }
        screeningResponses:
          type: array
          items:
            type: object
            required: [questionId, response]
            properties:
              questionId: { type: string }
              response:   { type: string }
        consentGiven:      { type: boolean, description: "Must be true; reject submission if false" }

    # ─── MESSAGING ────────────────────────────────────────────────────────────

    MessageSend:
      type: object
      required: [body, channel]
      properties:
        body:        { type: string }
        channel:     { type: string, enum: [EMAIL, SMS] }
        aiAssisted:  { type: boolean, default: false }

    # ─── RIGHT TO WORK ────────────────────────────────────────────────────────

    RtwCheck:
      type: object
      required: [id, result, checkType, completedAt]
      properties:
        id:               { type: string }
        result:           { type: string, enum: [PASS, FAIL, PENDING] }
        checkType:        { type: string, enum: [IDVT, SHARE_CODE, MANUAL] }
        documentType:     { type: string, nullable: true }
        permissionExpiry: { type: string, format: date-time, nullable: true }
        completedAt:      { type: string, format: date-time }

    # ─── TALENT POOL ──────────────────────────────────────────────────────────

    TalentPoolEntry:
      type: object
      required: [id, tag, originalRole]
      properties:
        id:          { type: string }
        firstName:   { type: string }
        lastName:    { type: string }
        originalRole: { type: string }
        locationName: { type: string, nullable: true }
        tag:         { type: string, enum: [REHIRE_ELIGIBLE, CONDITIONAL_REHIRE, DO_NOT_REENGAGE] }
        notes:       { type: string, nullable: true }
        consentExpiry: { type: string, format: date-time }
        createdAt:   { type: string, format: date-time }

    # ─── AI ───────────────────────────────────────────────────────────────────

    AiJdRequest:
      type: object
      required: [roleTitle]
      properties:
        roleTitle:    { type: string }
        locationType: { type: string, enum: [RESTAURANT, HOTEL, BAR, EVENTS, OTHER] }

    AiCommsRequest:
      type: object
      required: [applicationId]
      properties:
        applicationId: { type: string, description: "Used to derive stage + role title only — no PII in prompt" }

    AiInterviewQuestionsRequest:
      type: object
      required: [applicationId]
      properties:
        applicationId: { type: string }

    AiTextResponse:
      type: object
      required: [draft]
      properties:
        draft: { type: string }

    AiInterviewQuestionsResponse:
      type: object
      required: [questions]
      properties:
        questions:
          type: array
          items: { type: string }
          minItems: 5
          maxItems: 8

security:
  - clerkSession: []

paths:

  # ═══════════════════════════════════════════════════════════════════════════
  # LOCATIONS
  # ═══════════════════════════════════════════════════════════════════════════

  /locations:
    get:
      operationId: listLocations
      summary: List all locations for the authenticated tenant
      tags: [Locations]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Location' }

    post:
      operationId: createLocation
      summary: Create a new location
      tags: [Locations]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LocationCreate' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Location' }
        '400':
          description: Validation error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /locations/{locationId}:
    parameters:
      - name: locationId
        in: path
        required: true
        schema: { type: string }
    patch:
      operationId: updateLocation
      summary: Update a location (name, timezone, active status)
      tags: [Locations]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:     { type: string }
                timezone: { type: string }
                isActive: { type: boolean }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Location' }

  /locations/{locationId}/assignments:
    parameters:
      - name: locationId
        in: path
        required: true
        schema: { type: string }
    post:
      operationId: assignManager
      summary: Assign a Location Manager to a location
      tags: [Locations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [clerkUserId]
              properties:
                clerkUserId: { type: string }
      responses:
        '201': { description: Assigned }
    delete:
      operationId: removeManager
      summary: Remove a Location Manager assignment
      tags: [Locations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [clerkUserId]
              properties:
                clerkUserId: { type: string }
      responses:
        '204': { description: Removed }

  # ═══════════════════════════════════════════════════════════════════════════
  # DASHBOARD
  # ═══════════════════════════════════════════════════════════════════════════

  /dashboard:
    get:
      operationId: getDashboard
      summary: Multi-location pipeline summary for the authenticated user's scope
      description: >
        Group Admins receive all locations. Location Managers receive assigned locations only.
        Enforced server-side; client does not pass a scope parameter.
      tags: [Dashboard]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  locations:
                    type: array
                    items: { $ref: '#/components/schemas/DashboardLocation' }

  # ═══════════════════════════════════════════════════════════════════════════
  # JOBS
  # ═══════════════════════════════════════════════════════════════════════════

  /jobs:
    get:
      operationId: listJobs
      summary: List jobs (scoped to user's location access)
      tags: [Jobs]
      parameters:
        - name: status
          in: query
          schema: { type: string, enum: [DRAFT, PUBLISHED, CLOSED, ARCHIVED] }
        - name: locationId
          in: query
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Job' }

    post:
      operationId: createJob
      summary: Create a new job posting
      tags: [Jobs]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/JobCreate' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Job' }

  /jobs/{jobId}:
    parameters:
      - name: jobId
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: getJob
      summary: Get job detail with application pipeline
      tags: [Jobs]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Job' }
    patch:
      operationId: updateJob
      summary: Update job (description, status, screening questions)
      tags: [Jobs]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                description: { type: string }
                status:      { type: string, enum: [DRAFT, PUBLISHED, CLOSED, ARCHIVED] }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Job' }

  /jobs/{jobId}/publish:
    parameters:
      - name: jobId
        in: path
        required: true
        schema: { type: string }
    post:
      operationId: publishJob
      summary: Publish job to Indeed and generate Google for Jobs structured data
      tags: [Jobs]
      responses:
        '200':
          description: Published
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:      { type: string }
                  indeedJobId: { type: string }

  # ═══════════════════════════════════════════════════════════════════════════
  # APPLICATIONS (operator-facing)
  # ═══════════════════════════════════════════════════════════════════════════

  /jobs/{jobId}/applications:
    parameters:
      - name: jobId
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: listApplications
      summary: List applications for a job, optionally filtered by stage
      tags: [Applications]
      parameters:
        - name: stage
          in: query
          schema:
            type: string
            enum: [APPLIED, SCREENING, INTERVIEW, OFFER, HIRED, REJECTED, WITHDRAWN]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Application' }

  /applications/{applicationId}:
    parameters:
      - name: applicationId
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: getApplication
      summary: Get full application detail including pipeline events and messages
      tags: [Applications]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Application' }

  /applications/{applicationId}/stage:
    parameters:
      - name: applicationId
        in: path
        required: true
        schema: { type: string }
    patch:
      operationId: updateStage
      summary: Move application to a new pipeline stage
      tags: [Applications]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [stage]
              properties:
                stage: { type: string, enum: [SCREENING, INTERVIEW, OFFER, HIRED, REJECTED, WITHDRAWN] }
                note:  { type: string }
      responses:
        '200':
          description: Stage updated; returns updated application with new pipeline event
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Application' }
        '409':
          description: Stage transition blocked (e.g. advancing to HIRED without completed RTW check)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /applications/{applicationId}/messages:
    parameters:
      - name: applicationId
        in: path
        required: true
        schema: { type: string }
    post:
      operationId: sendMessage
      summary: Send a message to the candidate on this application
      tags: [Messaging]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MessageSend' }
      responses:
        '201':
          description: Message queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  messageId: { type: string }
                  status:    { type: string }

  /applications/{applicationId}/interview-slots:
    parameters:
      - name: applicationId
        in: path
        required: true
        schema: { type: string }
    post:
      operationId: proposeInterviewSlots
      summary: Propose up to 3 interview time slots to the candidate
      tags: [Interviews]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [slots]
              properties:
                slots:
                  type: array
                  minItems: 1
                  maxItems: 3
                  items:
                    type: object
                    required: [proposedAt]
                    properties:
                      proposedAt: { type: string, format: date-time }
      responses:
        '201':
          description: Slots proposed; candidate notified
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    slotId:     { type: string }
                    proposedAt: { type: string, format: date-time }
                    status:     { type: string }

  /applications/{applicationId}/rtw:
    parameters:
      - name: applicationId
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: getRtwStatus
      summary: Get right-to-work check status for an application
      tags: [RightToWork]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RtwCheck' }
        '404':
          description: No RTW check initiated for this application

    post:
      operationId: initiateRtw
      summary: Initiate right-to-work verification workflow (sends candidate the verification link)
      tags: [RightToWork]
      responses:
        '201':
          description: RTW workflow initiated; candidate notified
          content:
            application/json:
              schema:
                type: object
                properties:
                  rtwCheckId: { type: string }
                  status:     { type: string, enum: [PENDING] }

  /applications/{applicationId}/offer:
    parameters:
      - name: applicationId
        in: path
        required: true
        schema: { type: string }
    post:
      operationId: createOffer
      summary: Generate and send a digital offer letter (Should-3)
      tags: [Offers]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                templateId: { type: string, nullable: true }
      responses:
        '201':
          description: Offer created and sent to candidate
          content:
            application/json:
              schema:
                type: object
                properties:
                  offerId:    { type: string }
                  acceptUrl:  { type: string }

  # ═══════════════════════════════════════════════════════════════════════════
  # GDPR / DATA SUBJECT RIGHTS
  # ═══════════════════════════════════════════════════════════════════════════

  /candidates/{candidateId}/dsar:
    parameters:
      - name: candidateId
        in: path
        required: true
        schema: { type: string }
    post:
      operationId: requestDsar
      summary: Initiate a Data Subject Access Request — queues export job
      tags: [GDPR]
      responses:
        '202':
          description: DSAR queued; export will be available within 24 hours
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:     { type: string }
                  estimatedReadyAt: { type: string, format: date-time }

  /candidates/{candidateId}/erasure:
    parameters:
      - name: candidateId
        in: path
        required: true
        schema: { type: string }
    post:
      operationId: requestErasure
      summary: >
        Right to erasure — queues deletion of all personal data within 72 hours.
        RTW records within 2-year retention window are preserved.
      tags: [GDPR]
      responses:
        '202':
          description: Erasure queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId: { type: string }

  # ═══════════════════════════════════════════════════════════════════════════
  # TALENT POOL (Should-1)
  # ═══════════════════════════════════════════════════════════════════════════

  /talent-pool:
    get:
      operationId: listTalentPool
      summary: List talent pool entries for the tenant (excludes DO_NOT_REENGAGE by default)
      tags: [TalentPool]
      parameters:
        - name: tag
          in: query
          schema: { type: string, enum: [REHIRE_ELIGIBLE, CONDITIONAL_REHIRE, DO_NOT_REENGAGE] }
        - name: locationId
          in: query
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/TalentPoolEntry' }

  /talent-pool/{entryId}:
    parameters:
      - name: entryId
        in: path
        required: true
        schema: { type: string }
    patch:
      operationId: updateTalentPoolEntry
      summary: Update tag or notes on a talent pool entry
      tags: [TalentPool]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                tag:   { type: string, enum: [REHIRE_ELIGIBLE, CONDITIONAL_REHIRE, DO_NOT_REENGAGE] }
                notes: { type: string }
      responses:
        '200':
          description: OK

  /talent-pool/campaigns:
    post:
      operationId: sendReengagementCampaign
      summary: Send batch re-engagement message to selected talent pool entries
      tags: [TalentPool]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [entryIds, messageBody]
              properties:
                entryIds:    { type: array, items: { type: string } }
                messageBody: { type: string }
                channel:     { type: string, enum: [EMAIL, SMS], default: SMS }
      responses:
        '202':
          description: Campaign queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  recipientCount: { type: integer }
                  jobId:          { type: string }

  # ═══════════════════════════════════════════════════════════════════════════
  # AI PRODUCTIVITY FEATURES
  # ═══════════════════════════════════════════════════════════════════════════

  /ai/job-description:
    post:
      operationId: generateJobDescription
      summary: >
        Generate a draft job description using role title and optional location type.
        No candidate data in prompt. Returns streaming text response.
      tags: [AI]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AiJdRequest' }
      responses:
        '200':
          description: Draft job description (non-streaming) or streamed text
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AiTextResponse' }
            text/event-stream:
              schema:
                type: string
                description: SSE stream of draft text tokens
        '503':
          description: AI provider unavailable
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /ai/comms-draft:
    post:
      operationId: generateCommsDraft
      summary: >
        Generate a draft candidate message. Uses only candidate first name, pipeline stage,
        and role title. No other PII in prompt.
      tags: [AI]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AiCommsRequest' }
      responses:
        '200':
          description: Draft message
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AiTextResponse' }
        '503':
          description: AI provider unavailable
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /ai/interview-questions:
    post:
      operationId: generateInterviewQuestions
      summary: >
        Generate 5-8 suggested interview questions for a role type.
        No candidate PII in prompt.
      tags: [AI]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AiInterviewQuestionsRequest' }
      responses:
        '200':
          description: Suggested questions list
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AiInterviewQuestionsResponse' }
        '503':
          description: AI provider unavailable
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ═══════════════════════════════════════════════════════════════════════════
  # FILE UPLOAD (pre-signed URL generation)
  # ═══════════════════════════════════════════════════════════════════════════

  /uploads/presign:
    post:
      operationId: presignUpload
      summary: Generate a pre-signed Cloudflare R2 upload URL (15-minute expiry)
      tags: [Uploads]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fileName, contentType, documentType]
              properties:
                fileName:     { type: string }
                contentType:  { type: string, enum: [application/pdf, image/jpeg, image/png] }
                documentType: { type: string, enum: [CV, RTW_DOCUMENT, OFFER_LETTER] }
                applicationId: { type: string, description: "Required for CV and RTW_DOCUMENT types" }
      responses:
        '200':
          description: Pre-signed URL and object key
          content:
            application/json:
              schema:
                type: object
                properties:
                  uploadUrl:  { type: string, description: "PUT to this URL directly from client" }
                  objectKey:  { type: string, description: "Store this key; pass back to create/update endpoints" }
                  expiresAt:  { type: string, format: date-time }

  # ═══════════════════════════════════════════════════════════════════════════
  # PUBLIC / CANDIDATE-FACING (no Clerk auth — token-based)
  # ═══════════════════════════════════════════════════════════════════════════

  /public/jobs/{applyLinkToken}:
    parameters:
      - name: applyLinkToken
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: getPublicJob
      summary: Get public job details and GDPR notice for the candidate application form
      tags: [Public]
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PublicJobDetails' }
        '404':
          description: Job not found or no longer accepting applications

  /public/jobs/{applyLinkToken}/apply:
    parameters:
      - name: applyLinkToken
        in: path
        required: true
        schema: { type: string }
    post:
      operationId: submitApplication
      summary: Submit a candidate application (no auth required)
      tags: [Public]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CandidateApplicationSubmit' }
      responses:
        '201':
          description: Application received; acknowledgement queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  applicationId: { type: string }
                  message: { type: string, example: "Thank you — we'll be in touch shortly." }
        '400':
          description: Validation error or consent not given
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '410':
          description: Job is closed and no longer accepting applications

  /public/interview-slots/{slotToken}:
    parameters:
      - name: slotToken
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: getInterviewSlots
      summary: Get available interview slots for candidate selection
      tags: [Public]
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  slots:
                    type: array
                    items:
                      type: object
                      properties:
                        slotId:     { type: string }
                        proposedAt: { type: string, format: date-time }
    post:
      operationId: confirmInterviewSlot
      summary: Candidate confirms a specific interview slot
      tags: [Public]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [slotId]
              properties:
                slotId: { type: string }
      responses:
        '200':
          description: Slot confirmed; candidate and manager notified

  /public/offers/{acceptanceToken}:
    parameters:
      - name: acceptanceToken
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: getOffer
      summary: Get offer details for candidate review
      tags: [Public]
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  offerLetterUrl: { type: string, description: "Pre-signed R2 URL for offer letter PDF" }
                  expiresAt:      { type: string, format: date-time }
    post:
      operationId: respondToOffer
      summary: Candidate accepts or declines the offer
      tags: [Public]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [response]
              properties:
                response: { type: string, enum: [ACCEPTED, DECLINED] }
      responses:
        '200':
          description: Response recorded

  /public/rtw/{rtwToken}:
    parameters:
      - name: rtwToken
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: getRtwInstructions
      summary: Get right-to-work verification instructions for the candidate
      tags: [Public]
      security: []
      responses:
        '200':
          description: Instructions and check type options

  # ═══════════════════════════════════════════════════════════════════════════
  # CRON JOB ENDPOINTS (internal — called by Vercel Cron, secured by CRON_SECRET)
  # ═══════════════════════════════════════════════════════════════════════════

  /cron/gdpr-purge:
    post:
      operationId: cronGdprPurge
      summary: Nightly GDPR candidate deletion job
      tags: [Cron]
      security: []
      description: >
        Called by Vercel Cron nightly. Secured by CRON_SECRET header, not Clerk.
        Processes GDPR_PURGE_CANDIDATE jobs from the job_queue table.
      responses:
        '200':
          description: Job processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  processed: { type: integer }
                  deleted:   { type: integer }

  /cron/reconsent-remind:
    post:
      operationId: cronReconsentRemind
      summary: Weekly talent pool re-consent reminder job
      tags: [Cron]
      security: []
      responses:
        '200': { description: Job processed }

  /cron/stale-alert:
    post:
      operationId: cronStaleAlert
      summary: Hourly stale application alert job
      tags: [Cron]
      security: []
      responses:
        '200': { description: Job processed }

  /cron/rtw-expiry:
    post:
      operationId: cronRtwExpiry
      summary: Daily right-to-work permission expiry alert job
      tags: [Cron]
      security: []
      responses:
        '200': { description: Job processed }
